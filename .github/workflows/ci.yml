name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '26.2.0'

jobs:
  xcode_test:
    name: Xcode test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: JohnTitor/setup-xcode@ed4e651374114d0a5cc19af4c736aca9a8a9e4f9 # v0.1.1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - run: ci/run.sh
        env:
          RUST_VERSION: nightly
          TARGET: ${{ matrix.target }}

  target_test:
    name: Target test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - x86_64-apple-ios
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: JohnTitor/setup-xcode@ed4e651374114d0a5cc19af4c736aca9a8a9e4f9 # v0.1.1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - run: ci/run.sh
        env:
          NOCTEST: '1'
          NORUN: '1'
          RUST_VERSION: nightly
          TARGET: ${{ matrix.target }}

  style_check:
    name: Style check
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: JohnTitor/setup-xcode@ed4e651374114d0a5cc19af4c736aca9a8a9e4f9 # v0.1.1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
